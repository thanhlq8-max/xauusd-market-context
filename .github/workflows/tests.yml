name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest build
      - run: python -m compileall xau_lfx scripts
      - run: pytest
      - run: python -m xau_lfx.pipeline validate-sources --input-dir examples/sample-data --event-file examples/sample-data/usd_events.csv
      - run: python -m xau_lfx.pipeline run-once --input-dir examples/sample-data --event-file examples/sample-data/usd_events.csv --out-dir artifacts
      - run: python -m xau_lfx.pipeline validate-artifacts --artifact-dir artifacts
      - run: python -m xau_lfx.pipeline validate-event-log --event-log data/events/event_log_template.csv
      - run: python -m xau_lfx.pipeline replay-event-log --event-log data/events/event_replay_template.csv --out-dir replay-report
      - run: python -m xau_lfx.validation.case_library_cli --event-log data/events/event_replay_template.csv --out-dir case-library-seed
      - run: python -m xau_lfx.validation.case_index_cli --case-library case-library-seed/case_library_seed.json --out-dir case-index
      - run: python -m xau_lfx.validation.evidence_pack_cli --case-index case-index/case_index.json --out-dir evidence-pack
      - run: python -m xau_lfx.validation.review_patch_cli --case-index case-index/case_index.json --patch-file data/events/reviewer_notes_patch_template.json --out-dir updated-case-index
      - run: python -m xau_lfx.connectors.candle_cli --source oanda --symbol XAUUSD --timeframe M1 --limit 1 --fixture-json data/events/oanda_candles_fixture.json --oanda-token test-token --out-dir normalized-ohlcv
      - run: python -m xau_lfx.pipeline report --artifact-dir artifacts --write-md
      - run: python -m xau_lfx.pipeline site --artifact-dir artifacts --out-dir site
      - run: python -m xau_lfx.pipeline demo --out-dir demo-artifacts --site-dir demo-site
      - run: python scripts/check_release_readiness.py
      - run: python -m build
